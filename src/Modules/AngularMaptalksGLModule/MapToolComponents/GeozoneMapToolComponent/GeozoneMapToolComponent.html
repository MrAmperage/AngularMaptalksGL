<TitlePanelComponent>Полигоны</TitlePanelComponent>
<div class="PanelRow">
  <div>
    <div class="MinimalGap">
      <nz-switch
        [nzSize]="'small'"
        [ngModel]="this.Options.IsShowName"
        (ngModelChange)="this.ChangeShowName($event)"
      /><span>Все названия</span>
    </div>
    <div class="MinimalGap">
      <nz-switch [nzSize]="'small'" /><span> По умолчанию</span>
    </div>
  </div>
  <div>
    <div class="MinimalGap">
      <nz-switch
        [nzSize]="'small'"
        [ngModel]="this.Options.IsShowCaption"
      /><span>Все описания</span>
    </div>
    <div class="MinimalGap">
      <nz-switch
        [nzSize]="'small'"
        [ngModel]="this.Options.IsShowOnlyActive"
        (ngModelChange)="this.ChangeShowOnlyActive($event)"
      />
      <span>Активные</span>
    </div>
  </div>
</div>
<div class="PanelRow">
  <div>
    <input
      type="text"
      nz-input
      placeholder="Поиск по названию"
      [ngModel]="this.Options.SearchInput"
      (ngModelChange)="this.ChangeSearch($event)"
      [nzSize]="'small'"
    />
  </div>
  <span>Выбрано {{this.GetCheckedCount}}</span>
</div>
<nz-tree
  [nzData]="this.Options.GeozonesInfo|TreeGeozoneConstructorPipe:this.Options.GeoFeaturesInfo:this.Options.TreeGeozones:this.Options.IsShowOnlyActive"
  [nzCheckable]="true"
  [nzSearchValue]="this.Options.SearchInput"
  [nzHideUnMatched]="true"
  [nzCheckedKeys]="this.Options.CheckedKeys"
  [nzVirtualItemSize]="0"
  [nzVirtualHeight]="'300px'"
  (nzCheckboxChange)="this.CheckTreeNode($event)"
  (nzClick)="this.ClickTreeNode($event)"
/>
